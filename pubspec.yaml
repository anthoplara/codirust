name: flutter_iot_helper
description: Flutter IoT Helper Service for device connection management via BLE, WiFi, and Cloud
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # BLE
  flutter_blue_plus: ^1.32.0
  
  # WiFi
  network_info_plus: ^5.0.0
  connectivity_plus: ^5.0.0
  
  # State Management
  rxdart: ^0.27.7
  
  # Utils
  get_it: ^7.6.4
  logger: ^2.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
